name: Check Replies

on:
  schedule:
    # Every 15 minutes (GitHub Actions minimum practical interval)
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

jobs:
  check-replies:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check and reply
        env:
          PPLX_KEY: ${{ secrets.PPLX_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SAP_AICORE_AUTH_URL: ${{ secrets.SAP_AICORE_AUTH_URL }}
          SAP_AICORE_CLIENT_ID: ${{ secrets.SAP_AICORE_CLIENT_ID }}
          SAP_AICORE_CLIENT_SECRET: ${{ secrets.SAP_AICORE_CLIENT_SECRET }}
          SAP_AICORE_BASE_URL: ${{ secrets.SAP_AICORE_BASE_URL }}
          SAP_AICORE_RESOURCE_GROUP: ${{ secrets.SAP_AICORE_RESOURCE_GROUP }}
          AICORE_DEPLOYMENT_PPLX: ${{ secrets.AICORE_DEPLOYMENT_PPLX }}
        run: python reply_handler.py
